<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pageside</title>
  <link rel="stylesheet" href="sidepanel.css" />
</head>
<body>
  <header class="topbar">
    <h1>Pageside</h1>
    <div class="topbar-actions">
      <button id="clear-button" type="button" title="Clear conversation">Clear</button>
      <button id="settings-button" type="button" title="Settings" aria-label="Settings">⚙</button>
    </div>
  </header>

  <section id="settings" hidden>
    <label for="profile-select">Profile</label>
    <div class="profile-row">
      <select id="profile-select"></select>
      <button id="add-profile" type="button" title="Add profile">Add</button>
      <button id="delete-profile" type="button" title="Delete profile">Delete</button>
    </div>

    <label for="setting-name">Name</label>
    <input id="setting-name" type="text" placeholder="e.g. Ollama" spellcheck="false" />

    <label for="setting-base-url">Base URL</label>
    <input id="setting-base-url" type="url" placeholder="http://127.0.0.1:11434" spellcheck="false" />
    <p class="hint">OpenAI-compatible server root, without /v1 — e.g. http://127.0.0.1:11434 (Ollama) or http://127.0.0.1:1234 (LM Studio).</p>

    <label for="setting-api-key">API key</label>
    <input id="setting-api-key" type="password" autocomplete="off" spellcheck="false" />
    <p class="hint">Leave blank if your server doesn't need one (e.g. Ollama).</p>

    <label for="setting-model">Model</label>
    <input id="setting-model" type="text" placeholder="e.g. llama3.1:8b" spellcheck="false" />

    <div class="settings-actions">
      <button id="save-settings" type="button">Save</button>
      <span id="settings-status" class="hint" role="status"></span>
    </div>
  </section>

  <main id="transcript" aria-live="polite"></main>

  <footer class="composer-area">
    <div class="composer-meta">
      <label class="context-toggle">
        <input id="include-context" type="checkbox" checked />
        Include page context
      </label>
      <span id="context-hint" hidden></span>
      <select id="profile-switcher" title="Active endpoint profile" aria-label="Active endpoint profile" hidden></select>
    </div>
    <form id="composer">
      <textarea id="prompt" rows="3" placeholder="Ask about this page…"></textarea>
      <button id="send-button" type="submit">Send</button>
    </form>
  </footer>

  <script type="module" src="sidepanel.js"></script>
</body>
</html>
